<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バス停マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        #map { height: 400px; border-radius: 8px; }
        .status { margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚍 バス停マップ</h1>
            <p>テスト版</p>
        </div>
        
        <div id="status" class="status">マップを初期化中...</div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // シンプルなテストマップ
        const map = L.map('map').setView([35.6762, 139.6503], 13);
        
        L.tileLayer('https://tiles.openfree.map/osm/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        
        // テスト用マーカー
        L.marker([35.6762, 139.6503])
            .addTo(map)
            .bindPopup('テスト地点<br>東京駅')
            .openPopup();
            
        document.getElementById('status').textContent = '✅ マップ表示成功 - 基本動作確認完了';
    </script>
</body>
</html>
