<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バス停マップ | Notion連携アプリ</title>
    <meta name="description" content="Notionデータベースと連携したバス停マップアプリ">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">🚍 バス停マップ</h1>
            <p class="description">Notionデータベースと連携したリアルタイムバス停情報</p>
        </header>

        <main class="main">
            <div class="controls">
                <button id="refreshBtn" class="refresh-btn">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">データ更新</span>
                </button>
                
                <div class="stats">
                    <span class="stat-item">
                        <span class="stat-icon">📍</span>
                        <span>総バス停数: <span id="totalCount">-</span></span>
                    </span>
                    <span class="stat-item">
                        <span class="stat-icon">✅</span>
                        <span>表示中: <span id="loadedCount">-</span></span>
                    </span>
                </div>
            </div>

            <!-- Loading状態 -->
            <div id="loadingMessage" class="message loading-message">
                <div class="loading-spinner"></div>
                <p>Notionからバス停データを読み込み中...</p>
            </div>

            <!-- エラー状態 -->
            <div id="errorMessage" class="message error-message" style="display: none;">
                <h3>⚠️ エラーが発生しました</h3>
                <p id="errorText"></p>
                <button id="retryBtn" class="retry-btn">再試行</button>
            </div>

            <!-- マップ -->
            <div id="mapSection" class="map-section" style="display: none;">
                <div id="map" class="map-container"></div>
            </div>

            <!-- データなし状態 -->
            <div id="noDataMessage" class="message no-data-message" style="display: none;">
                <h3>📍 バス停データが見つかりません</h3>
                <p>Notionデータベースにバス停情報を追加してください。</p>
                <ul>
                    <li><strong>stop_desc</strong> (Title): バス停名・のりば名</li>
                    <li><strong>stop_id</strong> (Text): バス停ID</li>
                    <li><strong>stop_lat</strong> (Number): 緯度</li>
                    <li><strong>stop_lon</strong> (Number): 経度</li>
                </ul>
            </div>
        </main>
    </div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
